<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Interview Question Generator</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-3">🎯 Interview Question Generator</h3>

        <select id="category" class="form-select mb-3">
            <option value="hr">HR Questions</option>
            <option value="js">JavaScript Questions</option>
            <option value="tech">Technical Questions</option>
        </select>

        <button class="btn btn-primary w-100 mb-3" onclick="generateQuestion()">
            Generate Question
        </button>

        <div class="alert alert-info text-center" id="questionBox">
            Click button to get a question
        </div>

        <p class="text-center text-muted" id="time"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
